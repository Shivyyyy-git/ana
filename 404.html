<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Anastasia Tahou</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy-900: #0f1e35;
      --navy-800: #1a2942;
      --cream-50: #faf6ed;
      --cream-200: #ece5d3;
      --copper-300: #d9a47b;
      --copper-500: #b8744a;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: 'Inter', system-ui, sans-serif;
      background:
        radial-gradient(circle at 80% 20%, rgba(184, 116, 74, 0.25), transparent 50%),
        radial-gradient(circle at 10% 90%, rgba(217, 164, 123, 0.18), transparent 50%),
        linear-gradient(135deg, var(--navy-900), var(--navy-800));
      color: var(--cream-50);
      text-align: center;
    }
    .wrap { max-width: 520px; }
    .code {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(6rem, 18vw, 10rem);
      font-weight: 500;
      line-height: 1;
      color: var(--copper-300);
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.05rem;
      color: var(--cream-200);
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    a.btn {
      display: inline-block;
      padding: 0.85rem 1.6rem;
      border-radius: 999px;
      background: var(--cream-50);
      color: var(--navy-800);
      text-decoration: none;
      font-weight: 500;
      transition: background 200ms, color 200ms, transform 200ms;
    }
    a.btn:hover {
      background: var(--copper-300);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="code">404</div>
    <h1>That page wandered off.</h1>
    <p>The page you were looking for doesn't exist — or maybe it never did. Let's get you back to somewhere useful.</p>
    <a class="btn" href="/ana/">Back to home</a>
  </main>
</body>
</html>
